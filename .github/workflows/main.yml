# GitHub Action — generates a contribution snake SVG automatically.
name: Generate Snake

on:
  # Runs every 12 hours
  schedule:
    - cron: "0 */12 * * *"

  # Allows manual trigger from the Actions tab
  workflow_dispatch:

  # Also runs on every push to main
  push:
    branches:
      - main

# ✅ REQUIRED: explicit write permissions so the action can push to the output branch
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Generate snake SVGs into ./dist/
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔍 Show build status
        run: git status

      - name: 🚀 Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore: update snake animations 🐍"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
